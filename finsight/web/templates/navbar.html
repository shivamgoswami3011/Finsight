<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">

    <!-- Logo / Brand -->
    <a class="navbar-brand fw-bold text-warning" href="{% url 'home' %}">
        <i class="bi bi-graph-up-arrow"></i> FinSight
    </a>

    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse" id="navbarContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link active" href="{% url 'home' %}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'expadd' %}">
            <i class="bi bi-plus-circle"></i> Add Expense
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'expense_list' %}">
            <i class="bi bi-bar-chart-line"></i> View Expenses
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'budget' %}">
            <i class="bi bi-wallet2"></i> Budget
          </a>
        </li>

      </ul>

      <!-- Right Side User Dropdown -->
      <div class="dropdown">
        <button class="btn btn-warning dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle"></i> {{ request.user.username }}
        </button>

        <ul class="dropdown-menu dropdown-menu-end">

          <li>
            <a class="dropdown-item" href="{% url 'profile' %}">
              <i class="bi bi-person-circle"></i> {{ request.session.user_name }}
            </a>
          </li>

          <li><hr class="dropdown-divider"></li>

          <li>
            <a class="dropdown-item text-danger" href="{% url 'logout' %}">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>

        </ul>
      </div>

    </div>
  </div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
