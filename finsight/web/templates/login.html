<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight | Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .brand-title {
            font-size: 32px;
            font-weight: 700;
            color: #0d6efd;
        }
        .brand-subtitle {
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>

<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-4">

            <div class="card shadow-lg rounded-4">
                <div class="card-body p-4">

                    <!-- Project Title -->
                    <div class="text-center mb-4">
                        <div class="brand-title">FinSight</div>
                        <div class="brand-subtitle">Daily Expense Management System</div>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="txtemail" class="form-control" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="txtpassword" class="form-control" placeholder="Enter password" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-semibold">
                                Login
                            </button>
                        </div>
                    </form>

                    <!-- Register Link -->
                    <p class="text-center mt-3 mb-0">
                        Don’t have an account?
                        <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">
                            Register
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
