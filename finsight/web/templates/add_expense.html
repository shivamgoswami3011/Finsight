<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight | Add Expense</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     {% include "navbar.html" %}
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Add Expense</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" name="txtdate" required>
                        </div>

                        <!-- Amount -->
                        <div class="mb-3">
                            <label class="form-label">Amount</label>
                            <input type="number" class="form-control" name="txtamount" placeholder="Enter amount" required>
                        </div>

                        <!-- Category Dropdown -->
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="categorySelect" name="txtcategory" required>
                                <option value="">Select Category</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Bills">Bills</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <!-- Other Category Textbox -->
                        <div class="mb-3" id="otherCategoryBox" style="display:none;">
                            <input type="text"
                                   class="form-control"
                                   name="txtcategory_other"
                                   placeholder="Enter custom category">
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="txtdescription" rows="3" placeholder="Optional"></textarea>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                Add Expense
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Category Script -->
<script>
document.getElementById('categorySelect').addEventListener('change', function () {
    let otherBox = document.getElementById('otherCategoryBox');
    if (this.value === 'Other') {
        otherBox.style.display = 'block';
    } else {
        otherBox.style.display = 'none';
    }
});
</script>

</body>
</html>
