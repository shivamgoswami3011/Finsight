<!DOCTYPE html>
<html>
<head>
    <title>FinSight | My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

{% include "navbar.html" %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card shadow-lg rounded-4">

                <div class="card-header bg-warning text-dark text-center">
                    <h4>My Profile</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>First Name</label>
                                <input type="text" name="txtfname" class="form-control"
                                       value="{{ user.fname }}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Last Name</label>
                                <input type="text" name="txtlname" class="form-control"
                                       value="{{ user.lname }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="txtemail" class="form-control"
                                   value="{{ user.email }}" required>
                        </div>

                        <div class="mb-3">
                            <label>Mobile</label>
                            <input type="text" name="txtmobile" class="form-control"
                                   value="{{ user.mobile }}" required>
                        </div>

                        <div class="mb-3">
                            <label>Address</label>
                            <textarea name="txtaddress" class="form-control"
                                      rows="2">{{ user.address }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>City</label>
                                <input type="text" name="txtcity" class="form-control"
                                       value="{{ user.city }}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>State</label>
                                <input type="text" name="txtstate" class="form-control"
                                       value="{{ user.state }}">
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-semibold">
                                Update Profile
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
