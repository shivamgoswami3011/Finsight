<!DOCTYPE html>
<html>
<head>
    <title>Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include "navbar.html" %}
</head>
<body class="bg-light">

<div class="container mt-5">

    <h3 class="text-center mb-4">Expense List</h3>

    <table class="table table-bordered table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Description</th>
                <th width="160">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for e in data %}
            <tr>
                <td>{{ e.date }}</td>
                <td>₹ {{ e.amount }}</td>
                <td>{{ e.category }}</td>
                <td>{{ e.description }}</td>
                <td>
                    <!-- Edit Button -->
                    <button class="btn btn-sm btn-warning"
                            data-bs-toggle="modal"
                            data-bs-target="#editModal{{ e.id }}">
                        Edit
                    </button>

                    <!-- Delete -->
                    <a href="{% url 'delete_expense' e.id %}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this expense?')">
                        Delete
                    </a>
                </td>
            </tr>

            <!-- EDIT MODAL -->
            <div class="modal fade" id="editModal{{ e.id }}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <form method="POST">
                            {% csrf_token %}
                            <input type="hidden" name="id" value="{{ e.id }}">

                            <div class="modal-header bg-warning">
                                <h5 class="modal-title">Edit Expense</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <div class="modal-body">
                                <div class="mb-2">
                                    <label>Date</label>
                                    <input type="date" name="txtdate"
                                           value="{{ e.date|date:'Y-m-d' }}"
                                           class="form-control" required>
                                </div>

                                <div class="mb-2">
                                    <label>Amount</label>
                                    <input type="number" name="txtamount"
                                           value="{{ e.amount }}"
                                           class="form-control" required>
                                </div>

                                <div class="mb-2">
                                    <label>Category</label>
                                    <input type="text" name="txtcategory"
                                           value="{{ e.category }}"
                                           class="form-control" required>
                                </div>

                                <div class="mb-2">
                                    <label>Description</label>
                                    <textarea name="txtdescription"
                                              class="form-control">{{ e.description }}</textarea>
                                </div>
                            </div>

                            <div class="modal-footer">
                                <button type="submit" class="btn btn-success">Update</button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
            {% endfor %}
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
