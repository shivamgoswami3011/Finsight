<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight | Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .brand-title {
            font-size: 30px;
            font-weight: 700;
            color: #198754; /* green */
        }
        .brand-subtitle {
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>

<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-6">

            <div class="card shadow-lg rounded-4">
                <div class="card-body p-4">

                    <!-- Project Title -->
                    <div class="text-center mb-4">
                        <div class="brand-title">FinSight</div>
                        <div class="brand-subtitle">Create Your Account</div>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" name="txtfname" class="form-control" placeholder="First Name" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="txtlname" class="form-control" placeholder="Last Name" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="txtemail" class="form-control" placeholder="Enter Email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mobile</label>
                            <input type="text" name="txtmobile" class="form-control" placeholder="Enter Mobile" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="txtpassword" class="form-control" placeholder="Enter Password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea name="txtaddress" class="form-control" placeholder="Enter Address" rows="2"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">City</label>
                                <input type="text" name="txtcity" class="form-control" placeholder="City">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">State</label>
                                <input type="text" name="txtstate" class="form-control" placeholder="State">
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success fw-semibold">
                                Register
                            </button>
                        </div>
                    </form>

                    <!-- Login Link -->
                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">
                            Login
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
